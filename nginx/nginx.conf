server {
    listen 80;
    server_name _;

    # ── Homologacao ────────────────────────────────────────────────────────────
    # Acesse: http://<ip-da-vm>/homolog  → redireciona para porta 3000
    location = /homolog {
        return 302 http://$host:3000/;
    }

    # ── Producao ───────────────────────────────────────────────────────────────
    # Acesse: http://<ip-da-vm>/prod  → redireciona para porta 3001
    location = /prod {
        return 302 http://$host:3001/;
    }

    # ── Pagina inicial com links para os ambientes ─────────────────────────────
    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Ambientes</title>
<style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f5f5f5}
.card{background:#fff;border-radius:8px;padding:2rem 3rem;box-shadow:0 2px 8px rgba(0,0,0,.1);text-align:center}
h1{margin-bottom:1.5rem;color:#333}
a{display:block;margin:.5rem 0;padding:.75rem 2rem;border-radius:6px;text-decoration:none;font-weight:bold;color:#fff}
.homolog{background:#f59e0b}.prod{background:#10b981}</style>
</head>
<body><div class="card">
<h1>Registro Despesas/Receitas</h1>
<a class="homolog" href="/homolog">Homologacao (porta 3000)</a>
<a class="prod" href="/prod">Producao (porta 3001)</a>
</div></body></html>';
    }
}
